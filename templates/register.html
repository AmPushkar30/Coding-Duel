<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
  <script src="{{ url_for('static', filename='js/loader.js') }}"></script>

</head>
<body>
  <div id="page-loader">
  <div class="loader-core">
    <span>C</span><span>O</span><span>D</span><span>I</span><span>N</span><span>G</span>
    <span>D</span><span>U</span><span>E</span><span>L</span>
  </div>
  </div>

  <div class="neon-border">
    <div class="register-container">
      <h1>Register</h1>
      <form action="/register" method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm_password" required>

        <button type="submit">Register</button>
        <p class="login-link">
          Already registered? <a href="/login">Login here</a>
        </p>
     <a href="/admin/login" class="admin-btn">
  🔐 Admin Login
</a>



      </form>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div>
            {% for category, message in messages %}
              <p style="color: {% if category == 'error' %}red{% else %}lightgreen{% endif %};">
                {{ message }}
              </p>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

    </div>
  </div>
</body>
</html>
