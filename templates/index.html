<!DOCTYPE html>
<html lang="en">
<head>

 <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Share:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <script src="{{ url_for('static', filename='js/loader.js') }}"></script>

<body>
   <div id="page-loader">

<button class="main-button" data-start-url="{{ url_for('start_duel') }}">
